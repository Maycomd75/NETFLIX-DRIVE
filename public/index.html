<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Netflix</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Permissions-Policy" content="autoplay=(self), fullscreen=(self)">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#0f0f0f;
    color:#fff;
}

body.no-scroll{
    overflow:hidden;
}

/* HEADER */
header{
    position:fixed;
    top:0;
    width:100%;
    padding:18px 40px;
    background:linear-gradient(to bottom, rgba(0,0,0,.9), transparent);
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:999;
    transition:.4s;
}

header.scrolled{
    background:#000;
    box-shadow:0 5px 20px rgba(0,0,0,.7);
}

.logo{
    color:#e50914;
    font-size:28px;
    font-weight:700;
}

.menu{
    display:flex;
    gap:25px;
    font-size:14px;
}

.menu span{
    cursor:pointer;
    opacity:.8;
}

.menu span:hover{
    opacity:1;
}

/* HERO */
.hero{
    height:70vh;
    display:flex;
    align-items:center;
    padding:60px;
    margin-bottom:40px;
}

.hero-content{
    max-width:520px;
}

.hero h1{
    font-size:48px;
    margin-bottom:15px;
}

.hero p{
    font-size:15px;
    opacity:.85;
    margin-bottom:20px;
}

.hero button{
    padding:12px 26px;
    border:none;
    margin-right:10px;
    font-weight:600;
    cursor:pointer;
    border-radius:4px;
}

.play-btn{
    background:#fff;
    color:#000;
}

.info-btn{
    background:rgba(255,255,255,.3);
    color:#fff;
}

/* CONTENT */
#content{
    padding-top:120px;
}

.section{
    padding:20px 40px;
}

.section h2{
    margin-bottom:15px;
}

/* CARROSSEL */
.row{
    position:relative;
}

.grid{
    display:flex;
    gap:15px;
    overflow-x:auto;
    scroll-behavior:smooth;
    padding-bottom:15px;
}

.grid::-webkit-scrollbar{
    display:none;
}

.grid.few{
    justify-content:center;
}

/* SETAS */
.arrow{
    position:absolute;
    top:0;
    bottom:0;
    width:70px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    cursor:pointer;
    background:linear-gradient(to right, rgba(0,0,0,.8), transparent);
    z-index:10;
    opacity:0;
    transition:.3s;
}

.row:hover .arrow{
    opacity:1;
}

.arrow.right{
    right:0;
    background:linear-gradient(to left, rgba(0,0,0,.8), transparent);
}

.arrow.left{
    left:0;
}

/* CARD */
.movie{
    position:relative;
    width:200px;
    flex:0 0 auto;
    cursor:pointer;
    transition:.4s;
}

.movie img{
    width:100%;
    height:300px;
    object-fit:cover;
    border-radius:8px;
}

.movie:hover{
    transform:scale(1.18);
    z-index:20;
}

.movie-info{
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    padding:12px;
    background:linear-gradient(to top, rgba(0,0,0,.95), transparent);
    border-radius:8px;
    opacity:0;
    transition:.3s;
}

.movie:hover .movie-info{
    opacity:1;
}

.movie-info h4{
    font-size:14px;
}

.movie-info span{
    font-size:12px;
    opacity:.8;
}

.movie-info button{
    margin-top:6px;
    width:100%;
    padding:6px;
    border:none;
    background:#e50914;
    color:#fff;
    border-radius:4px;
    cursor:pointer;
}

/* POPUP PLAYER */
.popup{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.95);
    z-index:2000;
    align-items:center;
    justify-content:center;
}

.popup-content{
    width:90%;
    height:85%;
    position:relative;
}

.popup iframe{
    width:100%;
    height:100%;
    border-radius:10px;
}

/* LOADER */
.loader{
    position:absolute;
    inset:0;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    z-index:5;
}

.close-btn{
    position:absolute;
    top:-45px;
    right:0;
    font-size:35px;
    cursor:pointer;
}

/* MOBILE */
@media(max-width:600px){
    header{
        padding:12px 15px;
    }

    .menu{
        display:none;
    }

    .hero{
        height:45vh;
        padding:20px;
    }

    .hero h1{
        font-size:22px;
    }

    .hero p{
        font-size:13px;
    }

    .section{
        padding:15px;
    }

    .movie{
        width:120px;
    }

    .movie img{
        height:170px;
    }

    .arrow{
        display:none;
    }
}
</style>
</head>
<body>

<header>
    <div class="logo">MINHA NETFLIX</div>
    <div class="menu">
        <span>Início</span>
        <span>Séries</span>
        <span>Filmes</span>
        <span>Minha Lista</span>
    </div>
</header>

<div class="hero" id="hero">
    <div class="hero-content">
        <h1 id="heroTitle">Carregando...</h1>
        <p id="heroDesc"></p>
        <button class="play-btn" id="heroPlay">▶ Assistir</button>
        <button class="info-btn">Mais Informações</button>
    </div>
</div>

<div id="content"></div>

<div class="popup" id="popup">
    <div class="popup-content">
        <div class="close-btn" onclick="closePlayer()">✖</div>
        <div class="loader" id="loader">Carregando filme...</div>
        <iframe id="player" frameborder="0" allowfullscreen></iframe>
    </div>
</div>

<script>
// HEADER SCROLL
window.addEventListener("scroll",()=>{
    document.querySelector("header")
    .classList.toggle("scrolled", window.scrollY > 80);
});

// LOAD MOVIES
async function loadMovies(){
    const content=document.getElementById("content");
    content.innerHTML="<h2 style='padding:40px'>Carregando...</h2>";

    try{
        const res=await fetch("/api/movies");
        const data=await res.json();
        content.innerHTML="";

        // FILME DESTAQUE
        const featured=data[0].videos[0];
        document.getElementById("hero").style.background=
        `linear-gradient(to right, rgba(0,0,0,.9), rgba(0,0,0,.3)),
        url('capas/${featured.name}.jpg') center/cover no-repeat`;
        document.getElementById("heroTitle").innerText=featured.name;
        document.getElementById("heroDesc").innerText=
        featured.description || "Assista agora no Minha Netflix";
        document.getElementById("heroPlay").onclick=()=>play(featured.id);

        data.forEach(section=>{
            const div=document.createElement("div");
            div.className="section";
            div.innerHTML=`<h2>${section.category}</h2>`;

            const row=document.createElement("div");
            row.className="row";

            const left=document.createElement("div");
            left.className="arrow left";
            left.innerHTML="❮";

            const right=document.createElement("div");
            right.className="arrow right";
            right.innerHTML="❯";

            const grid=document.createElement("div");
            grid.className="grid";

            left.onclick=()=>grid.scrollBy({left:-700,behavior:"smooth"});
            right.onclick=()=>grid.scrollBy({left:700,behavior:"smooth"});

            if(section.videos.length<=5) grid.classList.add("few");

            section.videos.forEach(movie=>{
                const card=document.createElement("div");
                card.className="movie";
                card.innerHTML=`
                <img src="capas/${movie.name}.jpg"
                onerror="this.src='https://placehold.co/200x300?text=Sem+Capa'">
                <div class="movie-info">
                    <h4>${movie.name}</h4>
                    <span>HD • ${movie.year || "2024"}</span>
                    <button onclick="play('${movie.id}')">▶ Assistir</button>
                </div>`;
                grid.appendChild(card);
            });

            row.append(left,grid,right);
            div.appendChild(row);
            content.appendChild(div);
        });

    }catch{
        content.innerHTML="<h2 style='padding:40px'>Erro ao carregar catálogo</h2>";
    }
}

// PLAYER
function play(id){
    document.body.classList.add("no-scroll");
    document.getElementById("popup").style.display="flex";
    document.getElementById("loader").style.display="flex";
    const player=document.getElementById("player");
    player.src=`https://drive.google.com/file/d/${id}/preview?usp=drivesdk`;
    player.onload=()=>document.getElementById("loader").style.display="none";
}

function closePlayer(){
    document.body.classList.remove("no-scroll");
    document.getElementById("popup").style.display="none";
    document.getElementById("player").src="";
}

document.addEventListener("keydown",e=>{
    if(e.key==="Escape") closePlayer();
});

loadMovies();
</script>
</body>
</html>
